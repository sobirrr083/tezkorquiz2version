<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: #ECF2FF;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 28px;
  max-width: 1120px;
  width: 100%;
}

.tq-card {
  border-radius: 28px;
  padding: 48px 0px 0px 48px;
  display: flex;
  align-items: flex-start;
  gap: 0;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  min-height: 300px;
  transition: box-shadow 0.35s ease, transform 0.25s ease;
}
.tq-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 28px;
  border: 1.5px solid rgba(255,255,255,0.65);
  pointer-events: none;
  z-index: 3;
}

.blob {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}

/* LEFT */
.card-left {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 14px;
  flex: 0 0 55%;
  min-width: 0;
}

.card-title {
  font-size: 2.6rem;
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -0.8px;
  white-space: nowrap;
}

.card-desc {
  font-size: 0.92rem;
  font-weight: 600;
  line-height: 1.6;
  white-space: normal;
  max-width: 90%;
}

/* RIGHT — absolute, bottom-right */
.card-right {
  position: absolute;
  z-index: 2;
  right: -10px;
  bottom: -10px;
  width: 55%;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
}
.card-right img {
  display: block;
  width: 260px;
  height: 260px;
  object-fit: contain;
  filter: drop-shadow(0 12px 28px rgba(0,0,0,0.18));
  transform-origin: bottom right;
  pointer-events: none;
  user-select: none;
}

/* ──────────────────────────────
   CARD-SPECIFIC IMAGE POSITIONS
   ────────────────────────────── */

/* 1 — Test Yaratish: bir oz o'ngga */
.card-yaratish .card-right {
  right: -22px;
  bottom: -10px;
}
.card-yaratish .card-right img {
  transform: rotate(-8deg);
}

/* 2 — Testni Boshlash */
.card-boshlash .card-right {
  right: -10px;
  bottom: -10px;
}
.card-boshlash .card-right img {
  transform: rotate(12deg);
}

/* 3 — Segment 25: o'ngga va pastga */
.card-seg25 .card-right {
  right: -28px;
  bottom: -24px;
}
.card-seg25 .card-right img {
  transform: rotate(0deg) scale(1.05);
}

/* 4 — Segment Umumiy: o'ngga va pastga */
.card-segumm .card-right {
  right: -28px;
  bottom: -24px;
}
.card-segumm .card-right img {
  transform: rotate(0deg) scale(1.05);
}

/* ── CARD THEMES ── */

/* 1 — Soft Lavender */
.card-yaratish {
  background: linear-gradient(145deg,#ede9fe 0%,#ddd6fe 40%,#e0e7ff 100%);
  box-shadow: 0 18px 45px rgba(124,58,237,0.1);
}
.card-yaratish:hover { box-shadow: 0 26px 64px rgba(124,58,237,0.18); transform: translateY(-3px); }
.card-yaratish .blob { width:280px;height:280px;background:rgba(167,139,250,0.35);top:-80px;right:-80px;filter:blur(60px); }
.card-yaratish::before {
  content:'';position:absolute;inset:0;border-radius:28px;
  background:linear-gradient(145deg,rgba(255,255,255,0.6),rgba(255,255,255,0.2));
  pointer-events:none;z-index:1;
}
.card-yaratish .card-title { color:#4c1d95; }
.card-yaratish .card-desc  { color:#6d28d9; opacity:0.7; }

/* 2 — Soft Sky */
.card-boshlash {
  background: linear-gradient(145deg,#dbeafe 0%,#bfdbfe 40%,#e0f2fe 100%);
  box-shadow: 0 18px 45px rgba(29,78,216,0.1);
}
.card-boshlash:hover { box-shadow: 0 26px 64px rgba(29,78,216,0.18); transform: translateY(-3px); }
.card-boshlash .blob { width:300px;height:300px;background:rgba(96,165,250,0.3);bottom:-90px;right:-80px;filter:blur(65px); }
.card-boshlash::before {
  content:'';position:absolute;inset:0;border-radius:28px;
  background:linear-gradient(145deg,rgba(255,255,255,0.6),rgba(255,255,255,0.2));
  pointer-events:none;z-index:1;
}
.card-boshlash .card-title { color:#1e3a8a; }
.card-boshlash .card-desc  { color:#1d4ed8; opacity:0.7; }

/* 3 — Soft Mint */
.card-seg25 {
  background: linear-gradient(145deg,#d1fae5 0%,#a7f3d0 40%,#ccfbf1 100%);
  box-shadow: 0 18px 45px rgba(6,95,70,0.1);
}
.card-seg25:hover { box-shadow: 0 26px 64px rgba(6,95,70,0.18); transform: translateY(-3px); }
.card-seg25 .blob { width:270px;height:270px;background:rgba(52,211,153,0.3);top:-70px;right:-60px;filter:blur(60px); }
.card-seg25::before {
  content:'';position:absolute;inset:0;border-radius:28px;
  background:linear-gradient(145deg,rgba(255,255,255,0.6),rgba(255,255,255,0.2));
  pointer-events:none;z-index:1;
}
.card-seg25 .card-title { color:#064e3b; }
.card-seg25 .card-desc  { color:#059669; opacity:0.7; }

/* 4 — Soft Peach */
.card-segumm {
  background: linear-gradient(145deg,#fef3c7 0%,#fde68a 40%,#ffedd5 100%);
  box-shadow: 0 18px 45px rgba(180,83,9,0.1);
}
.card-segumm:hover { box-shadow: 0 26px 64px rgba(180,83,9,0.18); transform: translateY(-3px); }
.card-segumm .blob { width:290px;height:290px;background:rgba(251,191,36,0.3);bottom:-80px;left:-80px;filter:blur(65px); }
.card-segumm::before {
  content:'';position:absolute;inset:0;border-radius:28px;
  background:linear-gradient(145deg,rgba(255,255,255,0.6),rgba(255,255,255,0.2));
  pointer-events:none;z-index:1;
}
.card-segumm .card-title { color:#78350f; }
.card-segumm .card-desc  { color:#b45309; opacity:0.7; }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .cards-grid { gap: 22px; }
  .card-title { font-size: 2.3rem; }
  .card-right img { width: 240px; height: 240px; }
}
@media (max-width: 900px) {
  .card-title { font-size: 2rem; }
  .tq-card { min-height: 280px; padding: 44px 0 0 40px; }
  .card-right img { width: 210px; height: 210px; }

  .card-yaratish .card-right { right: -18px; bottom: -8px; }
  .card-seg25 .card-right    { right: -22px; bottom: -20px; }
  .card-segumm .card-right   { right: -22px; bottom: -20px; }
}
@media (max-width: 700px) {
  body { padding: 28px 14px; }
  .cards-grid { grid-template-columns: 1fr; gap: 18px; }
  .tq-card { padding: 36px 0 0 32px; min-height: 260px; }
  .card-title { font-size: 1.9rem; }
  .card-left { gap: 12px; flex: 0 0 52%; }
  .card-right { width: 48%; }
  .card-right img { width: 215px; height: 215px; }

  .card-yaratish .card-right { right: -16px; bottom: -10px; }
  .card-seg25 .card-right    { right: -20px; bottom: -20px; }
  .card-segumm .card-right   { right: -20px; bottom: -20px; }
  .card-boshlash .card-right { right: -10px; bottom: -10px; }
}
@media (max-width: 480px) {
  body { padding: 20px 12px; }
  .cards-grid { gap: 16px; }
  .card-title { font-size: 1.55rem; }
  .tq-card { padding: 30px 0 0 24px; min-height: 235px; }
  .card-left { flex: 0 0 50%; }
  .card-right { width: 50%; }
  .card-right img { width: 188px; height: 188px; }

  .card-yaratish .card-right { right: -12px; bottom: -8px; }
  .card-seg25 .card-right    { right: -16px; bottom: -16px; }
  .card-segumm .card-right   { right: -16px; bottom: -16px; }
  .card-boshlash .card-right { right: -8px;  bottom: -8px; }
}
@media (max-width: 360px) {
  .card-title { font-size: 1.35rem; }
  .tq-card { padding: 26px 0 0 20px; min-height: 210px; }
  .card-left { flex: 0 0 50%; }
  .card-right img { width: 162px; height: 162px; }

  .card-yaratish .card-right { right: -10px; bottom: -6px; }
  .card-seg25 .card-right    { right: -12px; bottom: -12px; }
  .card-segumm .card-right   { right: -12px; bottom: -12px; }
  .card-boshlash .card-right { right: -6px;  bottom: -6px; }
}

/* ── SCROLL ANIMATIONS ── */
.tq-card {
  opacity: 0;
  transform: translateY(32px);
  transition:
    opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.35s ease;
}
.tq-card.in-view {
  opacity: 1;
  transform: translateY(0);
}

/* Image fade-in after load */
.card-right img {
  opacity: 0;
  transition: opacity 0.4s ease;
}
.card-right img.loaded {
  opacity: 1;
}
</style>
</head>
<body>
<div class="cards-grid">

  <!-- CARD 1 — Test Yaratish -->
  <a class="tq-card card-yaratish" href="testyaratish">
    <div class="blob"></div>
    <div class="card-left">
      <h2 class="card-title">Test Yaratish</h2>
    </div>
    <div class="card-right">
      <img
        src="https://i.ibb.co/vW07PqT/28918018198981.png"
        alt="Test Yaratish"
        loading="lazy"
        decoding="async"
      >
    </div>
  </a>

  <!-- CARD 2 — Testni Boshlash -->
  <a class="tq-card card-boshlash" href="testni_boshlash">
    <div class="blob"></div>
    <div class="card-left">
      <h2 class="card-title">Testni Boshlash</h2>
    </div>
    <div class="card-right">
      <img
        src="https://i.ibb.co/dHD1rN5/1861868168166.png"
        alt="Testni Boshlash"
        loading="lazy"
        decoding="async"
      >
    </div>
  </a>

  <!-- CARD 3 — Segment 25 -->
  <a class="tq-card card-seg25" href="segment25">
    <div class="blob"></div>
    <div class="card-left">
      <h2 class="card-title">Segment 25</h2>
    </div>
    <div class="card-right">
      <img
        src="https://i.ibb.co/QvqQfRtb/188282828181.png"
        alt="Segment 25"
        loading="lazy"
        decoding="async"
      >
    </div>
  </a>

  <!-- CARD 4 — Segment Umumiy -->
  <a class="tq-card card-segumm" href="segmentumumiy">
    <div class="blob"></div>
    <div class="card-left">
      <h2 class="card-title">Segment Umumiy</h2>
    </div>
    <div class="card-right">
      <img
        src="https://i.ibb.co/QvqQfRtb/188282828181.png"
        alt="Segment Umumiy"
        loading="lazy"
        decoding="async"
      >
    </div>
  </a>

</div>

<script>
  /* Scroll-in animation */
  const cards = document.querySelectorAll('.tq-card');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });

  cards.forEach((card, i) => {
    card.style.transitionDelay = `${i * 80}ms`;
    observer.observe(card);
  });

  /* Image loaded fade-in */
  document.querySelectorAll('.card-right img').forEach(img => {
    const show = () => img.classList.add('loaded');
    if (img.complete && img.naturalWidth > 0) { show(); }
    else {
      img.addEventListener('load', show);
      img.addEventListener('error', show); /* error holida ham ko'rsatish */
    }
  });
</script>
</body>
</html>
