<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tezkor Karta</title>
<meta name="description" content="Savollar faylini yuklang va kartochka ko'rinishida o'rganing.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* Remove all blue outlines and selection highlights */
*:focus{outline:none}
*:focus-visible{outline:none}
button:focus,button:focus-visible{outline:none}
div:focus,div:focus-visible{outline:none}
:root{
  --brand:#4460ef;--brand-dark:#2d3eb5;--brand-bg:#eef2ff;
  --later:#C8A800;--later-bg:#F5EE9A;
  --clear:#3aaa35;--clear-bg:#C5F5A0;
  --surface:#fff;--bg:#FAFAFA;--border:#e8ecf4;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --radius:14px;
}
html{-webkit-tap-highlight-color:transparent;tap-highlight-color:transparent}
body{
  font-family:'Nunito','Roboto','Segoe UI',sans-serif;
  background:var(--bg);min-height:100vh;color:var(--text);
  -webkit-font-smoothing:antialiased;
}
button{
  font-family:inherit;cursor:pointer;border:none;
  transition:opacity .15s ease,transform .15s ease;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
button:hover{opacity:.86}
button:active{transform:scale(.95)!important;opacity:.8}
svg{display:block;flex-shrink:0}
p{margin:0}
a{-webkit-tap-highlight-color:transparent}

/* ── App container ── */
#app{display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px;min-height:100vh}
.wrap{width:100%;max-width:520px}
.wrap-upload{width:100%;max-width:800px}

/* ── View transitions ── */
.view-enter{animation:viewIn .35s cubic-bezier(.22,1,.36,1) both}
@keyframes viewIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── Header ── */
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.header-left{display:flex;align-items:center;gap:10px}
.header-right{display:flex;align-items:center;gap:8px}
.title{font-size:1.2rem;font-weight:900;color:var(--text);letter-spacing:-.3px}
.how-btn{font-size:11px;font-weight:700;color:var(--brand);background:var(--brand-bg);padding:5px 10px;border-radius:8px;white-space:nowrap}
.ghost-link{font-size:12px;font-weight:700;color:var(--text3);background:none}
.counter{display:flex;align-items:baseline;gap:2px;background:var(--surface);padding:5px 12px;border-radius:20px;box-shadow:0 2px 10px rgba(68,96,239,.10)}
.counter-cur{font-size:15px;font-weight:800;color:var(--brand)}
.counter-sep{font-size:13px;font-weight:700;color:#cbd5e1;margin:0 1px}
.counter-tot{font-size:13px;font-weight:700;color:var(--text3)}
.settings-btn{width:36px;height:36px;border-radius:10px;background:var(--surface);color:#64748b;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(68,96,239,.10)}

/* ── Stats row ── */
.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-chip{flex:1;background:var(--surface);border-radius:12px;padding:10px 0;text-align:center;box-shadow:0 2px 8px rgba(68,96,239,.06);display:flex;flex-direction:column;align-items:center;justify-content:center}
.stat-num{font-size:18px;font-weight:900;line-height:1.1}
.stat-lbl{font-size:10px;font-weight:700;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.finish-btn{flex:1;font-size:13px;font-weight:800;color:#64748b;background:var(--surface);border-radius:12px;white-space:nowrap;box-shadow:0 2px 8px rgba(68,96,239,.06);padding:10px 0;display:flex;align-items:center;justify-content:center}

/* ── Progress ── */
.progress-wrap{margin-bottom:14px}
.progress-track{width:100%;height:4px;background:rgba(68,96,239,.10);display:flex;overflow:hidden;border-radius:10px}
.progress-seg{height:100%;border-radius:10px;transition:width .6s cubic-bezier(.22,1,.36,1)}

/* ── Loop info ── */
.loop-info{background:rgba(245,158,11,.08);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;color:#92400e;margin-bottom:12px;text-align:center;display:flex;align-items:center;justify-content:center;gap:7px;animation:viewIn .3s ease}

/* ── Card ── */
.card-outer{display:flex;flex-direction:column}
.card-label{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:6px;padding-left:2px;transition:opacity .2s}
.card-wrap{
  width:100%;aspect-ratio:4/5;max-height:440px;
  cursor:pointer;perspective:1200px;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.card-inner{
  position:relative;width:100%;height:100%;
  transition:transform .5s cubic-bezier(.22,1,.36,1);
  transform-style:preserve-3d;
}
.card-face{
  position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:24px;background:var(--bg);
  box-shadow:0 8px 32px rgba(68,96,239,.09),0 2px 8px rgba(0,0,0,.04);
  transition:box-shadow .3s ease;
}
.card-face.known{box-shadow:0 8px 32px rgba(58,170,53,.18)}
.card-face.unknown{box-shadow:0 8px 32px rgba(200,168,0,.18)}
.card-face.back{background:#FFFFF0;transform:rotateY(180deg);box-shadow:0 8px 24px rgba(200,200,0,.07)}
.card-face-top{display:flex;align-items:center;justify-content:flex-end;min-height:28px}
.status-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:4px}
.status-badge.known{background:var(--clear-bg);color:var(--clear)}
.status-badge.unknown{background:var(--later-bg);color:var(--later)}
.question-text{font-size:1.2rem;font-weight:700;color:var(--text);line-height:1.6;margin:12px 0;flex:1;display:flex;align-items:center}
.answer-text{font-size:1.15rem;font-weight:700;line-height:1.65;margin:12px 0;flex:1;display:flex;align-items:center;color:#374151}
.flip-hint{font-size:11px;font-weight:600;color:#b0b8c8;display:flex;align-items:center;gap:5px}

/* Card slide animation */
.card-wrap{transition:opacity .4s cubic-bezier(.22,1,.36,1),transform .4s cubic-bezier(.22,1,.36,1)}
.card-exit-r{opacity:0!important;transform:translateX(80px) scale(.93) rotate(3deg)!important;transition:opacity .35s cubic-bezier(.4,0,.2,1),transform .35s cubic-bezier(.4,0,.2,1)!important}
.card-exit-l{opacity:0!important;transform:translateX(-80px) scale(.93) rotate(-3deg)!important;transition:opacity .35s cubic-bezier(.4,0,.2,1),transform .35s cubic-bezier(.4,0,.2,1)!important}

/* ── Action buttons ── */
.know-row{display:flex;gap:10px;margin-top:12px}
.know-btn{
  flex:1;display:flex;align-items:center;justify-content:center;
  gap:8px;padding:14px 16px;border-radius:var(--radius);
  font-size:14px;font-weight:800;transition:opacity .15s,transform .15s;
}
.know-btn.later{background:var(--later-bg);color:var(--later)}
.know-btn.clear{background:var(--clear-bg);color:var(--clear)}
.btn-icon{display:flex;align-items:center;flex-shrink:0}

/* ── Tip Ticker ── */
.tip-ticker{margin-top:14px;background:var(--surface);border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 2px 8px rgba(68,96,239,.05);min-height:56px}
.tip-icon{color:var(--brand);flex-shrink:0;margin-top:2px;display:flex}
.tip-lines{flex:1;transition:opacity .5s ease}
.tip-line1{font-size:12px;font-weight:700;color:#475569;line-height:1.45}
.tip-line2{font-size:11px;font-weight:600;color:var(--text3);line-height:1.45;margin-top:3px}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:20px;animation:fadeUp .22s ease}
.modal-panel{background:var(--surface);border-radius:22px;padding:24px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.18);animation:viewIn .25s cubic-bezier(.22,1,.36,1)}
.modal-panel.sm{max-width:360px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:900;color:var(--text)}
.close-btn{width:30px;height:30px;border-radius:8px;background:#f1f5f9;color:#64748b;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.divider{height:1px;background:#f1f5f9;margin:0 0 16px}
.modal-body{display:flex;flex-direction:column;gap:8px}
.modal-item{display:flex;align-items:center;gap:12px;padding:11px 13px;background:#f8fafc;border-radius:12px}
.modal-item-icon{color:var(--brand);flex-shrink:0;display:flex}
.modal-item-text{font-size:13px;color:#334155;font-weight:600;line-height:1.55}

/* ── Settings ── */
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}
.settings-label{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.settings-sub{font-size:12px;color:var(--text3);font-weight:600}
.toggle{width:48px;height:26px;border-radius:13px;position:relative;cursor:pointer;transition:background .25s;flex-shrink:0}
.toggle.on{background:var(--brand)}
.toggle.off{background:#e2e8f0}
.toggle-thumb{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .25s cubic-bezier(.22,1,.36,1)}
.toggle.on .toggle-thumb{transform:translateX(22px)}
.toggle.off .toggle-thumb{transform:translateX(2px)}
.settings-note{font-size:12px;color:#64748b;font-weight:600;background:var(--brand-bg);border-radius:10px;padding:10px 12px;line-height:1.6}

/* ── Upload page ── */
.upload-title{font-size:2rem;font-weight:900;color:var(--text);margin-bottom:8px;letter-spacing:-.5px}
.upload-desc{font-size:14px;color:#64748b;font-weight:600;margin-bottom:20px}

/* ── avz-card uslubidagi upload kartochkasi ── */
.upload-card-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;
}
@media(max-width:540px){.upload-card-grid{grid-template-columns:1fr;}}

.upload-avz-card{
  background:#fff;border-radius:20px;padding:28px 22px 22px;
  box-shadow:0 10px 40px rgba(68,96,239,.07);
  transition:box-shadow .35s ease,transform .25s ease;
  border:1.5px solid var(--border);
  display:flex;flex-direction:column;gap:10px;
}
.upload-avz-card:hover{
  box-shadow:0 20px 60px rgba(68,96,239,.14);
  transform:translateY(-2px);
}

/* Drop zone — tezkorquiz.html dagi upload-area bilan bir xil */
.drop-zone{
  grid-column:1 / -1;
  border:2px dashed #b8c4d8;
  border-radius:16px;
  padding:54px 30px;
  cursor:pointer;
  transition:border-color .25s,background .25s;
  background:#f3f6fc;
  text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.drop-zone:hover,.drop-zone.dragover{
  border-color:#4460ef;
  background:rgba(68,96,239,.05);
}
.drop-zone.dragover{
  background:rgba(68,96,239,.10);
}
.upload-icon{
  font-size:3.6rem;color:#94a3b8;margin-bottom:16px;display:block;
}
.upload-text{font-size:1.2rem;font-weight:600;color:#475569;margin-bottom:8px;}
.upload-subtext{color:#94a3b8;font-size:.95rem;}
.file-btn{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;padding:11px 28px;border-radius:11px;font-size:14px;font-weight:700;box-shadow:0 4px 14px rgba(68,96,239,.28);transition:opacity .15s,transform .15s,box-shadow .15s;margin-top:14px;}
.file-btn:hover{box-shadow:0 6px 20px rgba(68,96,239,.36)}

/* avz-card icon wrap */
.avz-icon-wrap{
  width:52px;height:52px;border-radius:14px;
  background:var(--brand-bg);display:flex;
  align-items:center;justify-content:center;
  color:var(--brand);transition:background .3s ease;
  flex-shrink:0;
}
.upload-avz-card:hover .avz-icon-wrap{background:var(--brand);}
.upload-avz-card:hover .avz-icon-wrap svg{stroke:#fff;}
.avz-card-title{font-size:13px;font-weight:800;color:var(--text)}
.avz-card-body{font-size:12px;color:#64748b;font-weight:600;line-height:1.65}

/* CTA card (avz-cta) */
.upload-avz-cta{
  grid-column:1 / -1;
  background:#4460ef;border-radius:20px;padding:24px 22px;
  box-shadow:0 10px 40px rgba(68,96,239,.22);
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  position:relative;overflow:hidden;
}
.upload-avz-cta::before{
  content:'';position:absolute;
  width:180px;height:180px;
  background:rgba(255,255,255,.07);border-radius:50%;
  top:-50px;right:-30px;pointer-events:none;
}
.upload-avz-cta .avz-icon-wrap{background:rgba(255,255,255,.15);}
.upload-avz-cta .avz-icon-wrap svg{stroke:#fff;}
.upload-avz-cta .avz-card-title{color:#fff;font-size:14px;}
.upload-avz-cta .avz-card-body{color:rgba(255,255,255,.75);}
.upload-avz-cta:hover .avz-icon-wrap{background:rgba(255,255,255,.25);}
.cta-inline-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:#fff;color:#4460ef;
  font-family:inherit;font-size:13px;font-weight:800;
  padding:11px 20px;border-radius:11px;text-decoration:none;
  border:none;cursor:pointer;flex-shrink:0;
  box-shadow:0 4px 14px rgba(0,0,0,.14);
  transition:transform .2s,box-shadow .2s;
}
.cta-inline-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,0,0,.18);}

.error-box{width:100%;background:#fef2f2;border:1.5px solid #fecaca;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:700;color:#dc2626;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.format-box{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:28px}
.format-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.format-icon{width:26px;height:26px;border-radius:7px;background:var(--brand-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--brand)}
.format-label{font-size:12px;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:.5px}
.format-pre{font-size:12px;line-height:1.9;color:#334155;background:#f8fafc;border-radius:10px;padding:12px 14px;font-family:'Courier New',monospace;white-space:pre-wrap;border-left:3px solid var(--brand)}
.format-note{font-size:12px;color:#64748b;margin-top:10px;font-weight:600}

/* ── Color picker (settings) ── */
.color-section{margin-bottom:4px}
.color-section-label{font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.color-dots{display:flex;gap:10px;flex-wrap:wrap}
.color-dot{
  width:34px;height:34px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;
  transition:transform .18s,border-color .18s,box-shadow .18s;
  flex-shrink:0;position:relative;
}
.color-dot:hover{transform:scale(1.13)}
.color-dot.active{
  border-color:var(--brand);
  box-shadow:0 0 0 3px rgba(68,96,239,.22);
  transform:scale(1.13);
}
.color-dot.active::after{
  content:'✓';position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.25);
}
/* linked toggle row */
.link-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 13px;background:#f8fafc;border-radius:12px;
  margin-bottom:16px;border:1.5px solid var(--border);
}
.link-row-left{display:flex;align-items:center;gap:8px}
.link-icon{color:var(--brand);display:flex}
.link-label{font-size:13px;font-weight:700;color:var(--text)}
.link-sub{font-size:11px;color:var(--text3);font-weight:600;margin-top:1px}

/* ── Summary ── */
.summary-wrap{display:flex;flex-direction:column;gap:0;background:#fff;border-radius:18px;border:1.5px solid var(--border);box-shadow:0 2px 12px rgba(68,96,239,.05);overflow:hidden}
.summary-section{
  background:transparent;border:none;box-shadow:none;border-radius:0;padding:20px;
  border-bottom:1px solid #f1f5f9;
  opacity:0;transform:translateY(18px);
  transition:opacity .45s ease,transform .5s cubic-bezier(.22,1,.36,1);
}
.summary-section:last-child{border-bottom:none}
.summary-section.visible{opacity:1;transform:translateY(0)}

/* Score */
.score-row{display:flex;align-items:center;justify-content:space-around;gap:8px;padding-top:14px}
.score-item{text-align:center;flex:1;padding:0 4px}
.score-divider-h{height:1px;background:#f0f4fa;margin:14px 0 0}
.score-divider-v{width:1px;height:40px;background:var(--border);flex-shrink:0}
.score-big{font-size:1.85rem;font-weight:900;color:var(--brand);line-height:1}
.score-pct{font-size:.9rem;font-weight:700;color:var(--text3)}
.score-val{font-size:1.4rem;font-weight:900;color:#334155;line-height:1}
.score-label{font-size:10px;font-weight:700;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:.3px}

/* Stats 2-col grid */
.stats-grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:20px;border-bottom:1px solid #f1f5f9}
.stat-g-item{
  background:#f8fafc;border-radius:14px;padding:18px 16px;
  display:flex;flex-direction:column;align-items:flex-start;gap:6px;
  border:1px solid var(--border);
}
.stat-g-icon{display:flex;margin-bottom:2px}
.stat-g-value{font-size:1.6rem;font-weight:900;line-height:1.1}
.stat-g-label{font-size:11px;font-weight:700;color:#64748b}
.stat-g-sub{font-size:10px;font-weight:600;color:var(--text3)}

/* Insights */
.section-title{font-size:12px;font-weight:800;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.4px}
.insight-list{display:flex;flex-direction:column;gap:8px}
.insight-item{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:11px 13px;background:#f8fafc;border-radius:11px;border:1px solid var(--border)}
.insight-icon{display:flex;flex-shrink:0;margin-top:1px}
.insight-label{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.2px}
.insight-text{font-size:12px;font-weight:700;color:#334155;line-height:1.5}
.insight-extra{font-size:12px;font-weight:800;white-space:nowrap;flex-shrink:0;padding-top:2px}

/* Quote */
.quote-card{background:#f8faff;border-radius:14px;padding:18px 20px;border:1px solid #e0e7ff}
.quote-mark{font-size:36px;font-weight:900;color:#c7d2fe;line-height:1;margin-bottom:4px;font-family:Georgia,serif}
.quote-text{font-size:14px;font-weight:700;color:#334155;line-height:1.65;margin-bottom:10px;font-style:italic}
.quote-author{font-size:12px;font-weight:800;color:var(--brand)}

/* Grade meter */
.grade-meter{display:flex;gap:6px;align-items:flex-end;justify-content:center;padding:12px 0 6px}
.grade-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.grade-bar{border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all .65s cubic-bezier(.34,1.56,.64,1)}
.grade-bar span{color:#fff;font-weight:900;font-size:14px}
.grade-note{text-align:center;font-size:12px;font-weight:700;margin-top:6px;opacity:0;transition:opacity .5s ease .4s}
.grade-note.show{opacity:1}

/* Summary action buttons */
.summary-actions{display:flex;gap:10px}
.sum-btn{
  flex:1;padding:14px 0;border-radius:13px;
  font-size:14px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s,transform .15s;
}
.sum-btn.primary{background:#e2e8f0;color:#475569}
.sum-btn.secondary{background:#e2e8f0;color:#475569}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>

<script>

// ── Parser ─────────────────────────────────────────────────────────────────────
function parseTxt(text){
  const blocks=text.trim().split(/\n\s*\n/), cards=[];
  blocks.forEach((block,idx)=>{
    const lines=block.trim().split('\n').map(l=>l.trim()).filter(Boolean);
    const ai=lines.findIndex(l=>/^ANSWER\s*:/i.test(l));
    if(ai===-1)return;
    const letter=lines[ai].replace(/^ANSWER\s*:\s*/i,'').trim().toUpperCase();
    const opts=lines.filter(l=>/^[A-D][\.\)]\s/.test(l));
    const qs=lines.filter(l=>!/^[A-D][\.\)]\s/.test(l)&&!/^ANSWER\s*:/i.test(l));
    if(!qs.length||!opts.length)return;
    const correct=opts.find(l=>l[0].toUpperCase()===letter);
    const ans=(correct||`To'g'ri javob: ${letter}`).replace(/^[A-D][\.\)]\s*/i,'').trim();
    cards.push({id:idx+1,question:qs.join(' '),answer:ans});
  });
  return cards;
}

function formatTime(ms){
  const s=Math.floor(ms/1000);
  if(s<60)return`${s} son`;
  const m=Math.floor(s/60),r=s%60;
  return r>0?`${m} daq ${r} son`:`${m} daq`;
}

    <div class="settings-note"><strong>Swipe:</strong> O'ngga → Tushunarli · Chapga → Keyinroq</div>
  </div>
</div>`;
  }
  return'';
}

// ── Summary ────────────────────────────────────────────────────────────────────
function renderSummary(){
  const {cards,statusMap,loopCount,totalMs,cardTimes,unknownCounts,quoteIdx}=S;
  const known=Object.values(statusMap).filter(s=>s==='known').length;
  const unknown=Object.values(statusMap).filter(s=>s==='unknown').length;
  const total=cards.length;
  const percent=total>0?Math.round(known/total*100):0;
  const quote=QUOTES[quoteIdx];
  const gIdx=GRADES.findIndex(g=>percent>=g.min&&percent<=g.max);
  const aGrade=GRADES[gIdx]||GRADES[0];
  const gradeH=[28,37,46,55,64];

  const gradeBars=GRADES.map((g,i)=>{
    const isA=i===gIdx,isPast=i<gIdx;
    const h=gradeH[i];const w=isA?48:34;
    const bg=isA?g.color:isPast?g.color:'#e8ecf4';
    const op=isA?1:isPast?.4:.25;
    const lbl=isA?`<span style="color:#fff;font-weight:900;font-size:14px">${g.label}</span>`:'';
    return`<div class="grade-bar-wrap"><div class="grade-bar" id="gbar${i}" style="width:${w}px;height:${h}px;background:${bg};opacity:${op}">${lbl}</div><span style="font-size:${isA?12:9}px;font-weight:${isA?900:600};color:${isA?g.color:'#b0bac9'};transition:all .4s">${g.label}</span></div>`;
  }).join('');

  const avgT={};
  Object.entries(cardTimes).forEach(([id,times])=>{avgT[id]=times.reduce((a,b)=>a+b,0)/times.length;});
  const st=Object.entries(avgT).sort((a,b)=>b[1]-a[1]);
  const slowId=st[0]?.[0],fastId=st[st.length-1]?.[0];
  const su=Object.entries(unknownCounts).sort((a,b)=>b[1]-a[1]);
  const hardId=su[0]?.[0];
  const gc=id=>cards.find(c=>String(c.id)===String(id));

  const insights=[
    slowId&&{icon:'turtle',lbl:"Eng ko'p vaqt ketgan",txt:gc(slowId)?.question.slice(0,60),ex:formatTime(avgT[slowId]||0),col:'#f59e0b'},
    fastId&&fastId!==slowId&&{icon:'bolt',lbl:"Eng tez javob",txt:gc(fastId)?.question.slice(0,60),ex:formatTime(avgT[fastId]||0),col:'#3aaa35'},
    hardId&&{icon:'brain',lbl:"Eng qiyin karta",txt:gc(hardId)?.question.slice(0,60),ex:`${unknownCounts[hardId]||0}× keyinroq`,col:'#ef4444'},
  ].filter(Boolean).map(it=>`
    <div class="insight-item">
      <div class="insight-icon" style="color:${it.col}">${I[it.icon]}</div>
      <div style="flex:1;min-width:0"><div class="insight-label">${it.lbl}</div><div class="insight-text">${it.txt||''}${(it.txt?.length||0)>=60?'…':''}</div></div>
      <div class="insight-extra" style="color:${it.col}">${it.ex}</div>
    </div>`).join('');

  const avgPerCard=total>0?formatTime(Math.round(totalMs/total)):'—';

  return`
  <div class="wrap view-enter">
    <div class="header-row">
      <h2 class="title">Tezkor Karta</h2>
      <button class="ghost-link" id="btnHome">← Bosh sahifa</button>
    </div>
    <div class="summary-wrap">
      <div class="summary-section" id="sec0">
        <div class="grade-meter">${gradeBars}</div>
        <div class="grade-note" id="gradeNote" style="color:${aGrade.color}">${aGrade.note}</div>
        <div class="score-divider-h"></div>
        <div class="score-row">
          <div class="score-item"><div class="score-big">${percent}<span class="score-pct">%</span></div><div class="score-label">Natija</div></div>
          <div class="score-divider-v"></div>
          <div class="score-item"><div class="score-val">${formatTime(totalMs)}</div><div class="score-label">Umumiy vaqt</div></div>
          <div class="score-divider-v"></div>
          <div class="score-item"><div class="score-val">${loopCount}</div><div class="score-label">Loop soni</div></div>
        </div>
      </div>
      <div class="stats-grid2" id="sec1" style="opacity:0;transform:translateY(18px);transition:opacity .45s ease,transform .5s cubic-bezier(.22,1,.36,1)">
        <div class="stat-g-item"><div class="stat-g-icon" style="color:#3aaa35">${I.known}</div><div class="stat-g-value" style="color:#3aaa35">${known}</div><div class="stat-g-label">Tushunarli kartalar</div><div class="stat-g-sub">${percent}% muvaffaqiyat</div></div>
        <div class="stat-g-item"><div class="stat-g-icon" style="color:#C8A800">${I.later}</div><div class="stat-g-value" style="color:#C8A800">${unknown}</div><div class="stat-g-label">Keyinroq kartalar</div><div class="stat-g-sub">${100-percent}% qoldi</div></div>
        <div class="stat-g-item"><div class="stat-g-icon" style="color:#4460ef">${I.trophy}</div><div class="stat-g-value" style="color:#4460ef">${total}</div><div class="stat-g-label">Jami karta</div><div class="stat-g-sub">${loopCount} loop o'tildi</div></div>
        <div class="stat-g-item"><div class="stat-g-icon" style="color:#8b5cf6">${I.clock}</div><div class="stat-g-value" style="color:#8b5cf6">${avgPerCard}</div><div class="stat-g-label">O'rtacha / karta</div><div class="stat-g-sub">Jami: ${formatTime(totalMs)}</div></div>
      </div>
      ${insights?`<div class="summary-section" id="sec2"><div class="section-title">${I.bar} Tahlil</div><div class="insight-list">${insights}</div></div>`:''}
      <div class="summary-section" id="sec3">
        <div class="quote-card"><div class="quote-mark">"</div><p class="quote-text">${quote.text}</p><div class="quote-author">— ${quote.author}</div></div>
      </div>
      <div class="summary-section" id="sec4">
        <div class="summary-actions">
          <button class="sum-btn primary" id="btnRestart">Boshidan boshlash</button>
          <button class="sum-btn secondary" id="btnNewFile">Yangi fayl</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── Summary animations ─────────────────────────────────────────────────────────
function initSummaryAnim(){
  const known=Object.values(S.statusMap).filter(s=>s==='known').length;
  const total=S.cards.length;
  const percent=total>0?Math.round(known/total*100):0;
  const gIdx=GRADES.findIndex(g=>percent>=g.min&&percent<=g.max);
  const gradeH=[28,37,46,55,64];

  // Sections fade in
  [0,2,3,4].forEach((id,order)=>{
    const el=document.getElementById('sec'+id);
    if(el) setTimeout(()=>el.classList.add('visible'),80+order*90);
  });
  const s1=document.getElementById('sec1');
  if(s1) setTimeout(()=>{s1.style.opacity='1';s1.style.transform='translateY(0)';},170);

  // Grade bars animate
  setTimeout(()=>{
    GRADES.forEach((_,i)=>{
      const bar=document.getElementById('gbar'+i);
      if(!bar)return;
      const isA=i===gIdx;
      const h=isA?gradeH[i]+30:gradeH[i];
      bar.style.transition=`all .65s cubic-bezier(.34,1.56,.64,1) ${.05*i}s`;
      bar.style.height=h+'px';
      bar.style.width=(isA?48:34)+'px';
    });
    setTimeout(()=>{
      const n=document.getElementById('gradeNote');
      if(n)n.classList.add('show');
    },450);
  },120);
}

// ── Tip timer ─────────────────────────────────────────────────────────────────
let tipTimer=null;
function startTipTimer(){
  if(tipTimer)clearInterval(tipTimer);
  tipTimer=setInterval(()=>{
    const el=document.getElementById('tipLines');
    if(!el)return;
    el.style.opacity='0';
    setTimeout(()=>{
      S.tipIdx=(S.tipIdx+1)%TIPS.length;
      const t=TIPS[S.tipIdx];
      const l1=el.querySelector('.tip-line1');
      const l2=el.querySelector('.tip-line2');
      if(l1)l1.textContent=t.l1;
      if(l2)l2.textContent=t.l2;
      el.style.opacity='1';
    },500);
  },10000);
}

// ── Event binding ──────────────────────────────────────────────────────────────
let txX=null,txY=null;
function bind(){
  // Upload — tezkorquiz.html dagi aynan nusxa
  const dz=document.getElementById('dropZone');
  const fi=document.getElementById('fileInput');
  const fb=document.getElementById('fileBtn');
  if(dz){
    ['dragenter','dragover','dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation()}));
    dz.addEventListener('dragenter',()=>dz.classList.add('dragover'));
    dz.addEventListener('dragover',()=>dz.classList.add('dragover'));
    dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
    dz.addEventListener('drop',e=>{dz.classList.remove('dragover');loadFile(e.dataTransfer.files[0]);});
    dz.addEventListener('click',()=>fi.click());
  }
  if(fb)fb.addEventListener('click',e=>{e.stopPropagation();fi?.click();});
  if(fi)fi.addEventListener('change',e=>{loadFile(e.target.files[0]);e.target.value='';});

  // Quiz card
  const cw=document.getElementById('cardWrap');
  if(cw){
    cw.addEventListener('click',flip);
    cw.addEventListener('touchstart',e=>{txX=e.touches[0].clientX;txY=e.touches[0].clientY;},{passive:true});
    cw.addEventListener('touchend',e=>{
      if(txX===null)return;
      const dx=e.changedTouches[0].clientX-txX;
      const dy=Math.abs(e.changedTouches[0].clientY-txY);
      if(Math.abs(dx)>50&&dy<60){dx>0?setStatus('known'):setStatus('unknown');}
      txX=null;txY=null;
    });
  }
  // Buttons
  const bL=document.getElementById('btnLater');
  const bC=document.getElementById('btnClear');
  if(bL)bL.addEventListener('click',e=>{e.stopPropagation();setStatus('unknown');});
  if(bC)bC.addEventListener('click',e=>{e.stopPropagation();setStatus('known');});
  const bF=document.getElementById('btnFinish');
  if(bF)bF.addEventListener('click',finish);
  // Header
  const bH=document.getElementById('btnHow');
  if(bH)bH.addEventListener('click',()=>{S.activeModal='how';render();});
  const bS=document.getElementById('btnSettings');
  if(bS)bS.addEventListener('click',()=>{S.activeModal='settings';render();});
  // Modal close
  const mo=document.getElementById('mo');
  if(mo)mo.addEventListener('click',e=>{if(e.target===mo){S.activeModal=null;render();}});
  const mc=document.getElementById('mc');
  if(mc)mc.addEventListener('click',()=>{S.activeModal=null;render();});
  const tg=document.getElementById('toggleBtn');
  if(tg)tg.addEventListener('click',()=>{S.showButtons=!S.showButtons;S.activeModal='settings';render();});
  // Summary
  const bHo=document.getElementById('btnHome');
  if(bHo)bHo.addEventListener('click',goUpload);
  const bR=document.getElementById('btnRestart');
  if(bR)bR.addEventListener('click',restart);
  const bNF=document.getElementById('btnNewFile');
  if(bNF)bNF.addEventListener('click',goUpload);
  // Keyboard
  document.onkeydown=S.view==='quiz'?handleKey:null;
  // Tip ticker
  if(S.view==='quiz')startTipTimer();
  else{if(tipTimer)clearInterval(tipTimer);tipTimer=null;}
}

// ── File loading ───────────────────────────────────────────────────────────────
function loadFile(file){
  if(!file)return;
  if(!file.name.toLowerCase().endsWith('.txt')){S.uploadError="Faqat .txt formatdagi fayl qabul qilinadi";render();return;}
  const r=new FileReader();
  r.onload=e=>{
    const parsed=parseTxt(e.target.result);
    if(!parsed.length){S.uploadError="Faylda to'g'ri formatdagi savollar topilmadi.";render();return;}
    Object.assign(S,{cards:parsed,uploadError:null,statusMap:{},sessionQueue:parsed.map(c=>c.id),
      sessionIdx:0,loopCount:1,flipped:false,loopInfo:null,cardTimes:{},unknownCounts:{},
      cardStartTime:Date.now(),sessionStartTime:Date.now(),view:'quiz'});
    render();
  };
  r.onerror=()=>{S.uploadError="Faylni o'qishda xatolik yuz berdi";render();};
  r.readAsText(file,'UTF-8');
}

// ── Quiz logic ─────────────────────────────────────────────────────────────────
function recTime(cid){
  if(!S.cardStartTime||!cid)return;
  const ms=Date.now()-S.cardStartTime;
  S.cardTimes[cid]=[...(S.cardTimes[cid]||[]),ms];
  S.cardStartTime=Date.now();
}

// Patch only card + stats — no full re-render
function patchQuizUI(){
  const {sessionQueue,sessionIdx,statusMap,cards,showButtons}=S;
  const cardId=sessionQueue[sessionIdx];
  const card=cards.find(c=>c.id===cardId);
  const status=card?statusMap[card.id]:undefined;
  const known=Object.values(statusMap).filter(s=>s==='known').length;
  const unknown=Object.values(statusMap).filter(s=>s==='unknown').length;
  const allSt=cards.map(c=>statusMap[c.id]||'unseen');
  const total=allSt.length;
  const clPct=total>0?(allSt.filter(s=>s==='known').length/total)*100:0;
  const ltPct=total>0?(allSt.filter(s=>s==='unknown').length/total)*100:0;

  // Counter
  const cc=document.querySelector('.counter-cur');
  const ct=document.querySelector('.counter-tot');
  if(cc)cc.textContent=sessionIdx+1;
  if(ct)ct.textContent=sessionQueue.length;

  // Stats chips
  const nums=document.querySelectorAll('.stat-num');
  if(nums[0])nums[0].textContent=unknown;
  if(nums[1])nums[1].textContent=known;

  // Progress
  const segs=document.querySelectorAll('.progress-seg');
  if(segs[0])segs[0].style.width=clPct+'%';
  if(segs[1])segs[1].style.width=ltPct+'%';

  // Card label
  const lbl=document.querySelector('.card-label');
  if(lbl)lbl.textContent='Savol';

  // Card content
  if(card){
    const badge=status?`<span class="status-badge ${status}">${status==='known'?I.known+' Tushunarli':I.later+' Keyinroq'}</span>`:'';
    const frontTop=document.querySelector('.card-face:not(.back) .card-face-top');
    const qText=document.querySelector('.question-text');
    if(frontTop)frontTop.innerHTML=badge;
    if(qText)qText.textContent=card.question;

    const aText=document.querySelector('.answer-text');
    if(aText)aText.textContent=card.answer;

    // Reset card face styles
    const front=document.querySelector('.card-face:not(.back)');
    if(front){front.className='card-face';if(status)front.classList.add(status);}
  }

  // Card inner reset to front
  const inn=document.getElementById('cardInner');
  if(inn)inn.style.transform='rotateY(0deg)';

  // Loop info
  const loopEl=document.querySelector('.loop-info');
  if(S.loopInfo&&S.loopInfo!=='allDone'){
    if(loopEl){loopEl.innerHTML=I.repeat+' '+S.loopInfo;}
    else{
      const pw=document.querySelector('.progress-wrap');
      if(pw){const d=document.createElement('div');d.className='loop-info';d.innerHTML=I.repeat+' '+S.loopInfo;pw.after(d);}
    }
  } else if(loopEl){loopEl.remove();}
}

// Animate card out → swap content → animate in (no DOM rebuild)
function transit(dir,cb){
  if(S.isAnimating)return;
  S.isAnimating=true;
  const cw=document.getElementById('cardWrap');

  // Exit animation
  if(cw){
    cw.style.transition='opacity .32s cubic-bezier(.4,0,.2,1), transform .32s cubic-bezier(.4,0,.2,1)';
    cw.style.opacity='0';
    cw.style.transform=dir===1
      ?'translateX(72px) scale(.93) rotate(3deg)'
      :'translateX(-72px) scale(.93) rotate(-3deg)';
  }

  setTimeout(()=>{
    cb(); // update S.sessionIdx etc
    S.flipped=false;

    // Swap card content instantly while invisible
    patchQuizUI();

    // Enter from opposite side (instant, no transition)
    if(cw){
      cw.style.transition='none';
      cw.style.opacity='0';
      cw.style.transform=dir===1
        ?'translateX(-48px) scale(.95)'
        :'translateX(48px) scale(.95)';

      // Force reflow then animate in
      cw.getBoundingClientRect();
      requestAnimationFrame(()=>{
        cw.style.transition='opacity .38s cubic-bezier(.22,1,.36,1), transform .42s cubic-bezier(.22,1,.36,1)';
        cw.style.opacity='1';
        cw.style.transform='translateX(0) scale(1)';
        setTimeout(()=>{S.isAnimating=false;},420);
      });
    } else {
      S.isAnimating=false;
    }
  },300);
}

function setStatus(val){
  if(S.isAnimating)return;
  const cid=S.sessionQueue[S.sessionIdx];
  recTime(cid);
  if(val==='unknown')S.unknownCounts[cid]=(S.unknownCounts[cid]||0)+1;
  S.statusMap={...S.statusMap,[cid]:val};
  const nm=S.statusMap;
  const dir=val==='known'?1:-1;
  const ni=S.sessionIdx+1;
  if(ni<S.sessionQueue.length){
    transit(dir,()=>{S.sessionIdx=ni;S.loopInfo=null;});
  } else {
    transit(dir,()=>{
      const lids=S.cards.filter(c=>nm[c.id]==='unknown').map(c=>c.id);
      if(lids.length){
        S.sessionQueue=lids;S.sessionIdx=0;S.loopCount++;
        S.loopInfo=`${lids.length} ta «Keyinroq» karta qayta boshlandi`;
      } else {
        finish();
      }
    });
  }
}

function flip(){
  if(S.isAnimating)return;
  S.flipped=!S.flipped;
  const inn=document.getElementById('cardInner');
  const lbl=document.querySelector('.card-label');
  if(inn)inn.style.transform=`rotateY(${S.flipped?180:0}deg)`;
  if(lbl)lbl.textContent=S.flipped?'Javob':'Savol';
}

function handleKey(e){
  const k=e.code;
  if(!['Space','Enter','ArrowLeft','ArrowRight','Digit1','Digit2'].includes(k))return;
  if(k==='Space'||k==='Enter'){e.preventDefault();flip();}
  else if(k==='ArrowRight'){
    const ni=S.sessionIdx+1;
    if(ni<S.sessionQueue.length&&!S.isAnimating){
      recTime(S.sessionQueue[S.sessionIdx]);
      transit(1,()=>{S.sessionIdx=ni;});
    }
  } else if(k==='ArrowLeft'){
    if(S.sessionIdx>0&&!S.isAnimating){
      recTime(S.sessionQueue[S.sessionIdx]);
      transit(-1,()=>{S.sessionIdx--;});
    }
  }
  else if(k==='Digit1')setStatus('unknown');
  else if(k==='Digit2')setStatus('known');
}

function finish(){
  S.totalMs=S.sessionStartTime?Date.now()-S.sessionStartTime:0;
  S.view='summary';
  render();
}

function restart(){
  Object.assign(S,{statusMap:{},sessionQueue:S.cards.map(c=>c.id),sessionIdx:0,
    loopCount:1,flipped:false,loopInfo:null,cardTimes:{},unknownCounts:{},
    cardStartTime:Date.now(),sessionStartTime:Date.now(),view:'quiz'});
  render();
}

function goUpload(){
  if(tipTimer)clearInterval(tipTimer);
  Object.assign(S,{view:'upload',cards:[],statusMap:{},sessionQueue:[],sessionIdx:0,
    flipped:false,loopCount:0,loopInfo:null,cardTimes:{},unknownCounts:{},
    uploadError:null,isAnimating:false,quoteIdx:Math.floor(Math.random()*QUOTES.length)});
  render();
}

render();
</script>
